services:
  # ─── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: noteforge-postgres
    mem_limit: 512m
    memswap_limit: 512m
    shm_size: 128m
    restart: on-failure
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: noteforge
      POSTGRES_PASSWORD: noteforge_secret
      POSTGRES_DB: noteforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db-init:/docker-entrypoint-initdb.d
    command: [
      "postgres",
      "-c", "shared_buffers=128MB",
      "-c", "work_mem=4MB",
      "-c", "max_connections=20"
    ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noteforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Consolidated API Monolith ────────────────────────────────────────────────

  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    container_name: noteforge-api
    mem_limit: 256m
    memswap_limit: 256m
    restart: on-failure
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_AUTH_NAME: auth_db
      DB_NOTES_NAME: notes_db
      DB_USER: noteforge
      DB_PASSWORD: noteforge_secret
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-noteforge-access-secret-change-in-prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-noteforge-refresh-secret-change-in-prod}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY_DAYS: ${JWT_REFRESH_EXPIRY_DAYS:-7}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      STORAGE_PATH: /app/storage
      NODE_ENV: ${NODE_ENV:-development}
      NODE_OPTIONS: --max-old-space-size=192
    volumes:
      - media_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  media_storage:
